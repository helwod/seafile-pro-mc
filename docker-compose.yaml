version: '2.0'
services:
  db:
    image: mariadb:10.5
    container_name: seafile-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=db_dev  # Required, set the root's password of MySQL service.
      - MYSQL_LOG_CONSOLE=true
    volumes:
      - seafile-mysql:/var/lib/mysql  # Required, specifies the path to MySQL data persistent store.
    networks:
      - seafile-net

  memcached:
    image: lovechen/seafile-pro-mc:memcached-latest-alpine
    container_name: seafile-memcached
    restart: unless-stopped
    entrypoint: memcached -m 256
    networks:
      - seafile-net

  elasticsearch:
    image: lovechen/elasticsearch:5.6.16
    container_name: seafile-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    deploy:
      resources:
        limits:
          memory: 2048M
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 2g
    volumes:
      - seafile-elasticsearch:/usr/share/elasticsearch/data  # Required, specifies the path to Elasticsearch data persistent store.
    networks:
      - seafile-net
          
  seafile:
    image: lovechen/seafile-pro-mc:core-sp-8.0.16
    container_name: seafile
    restart: unless-stopped
    ports:
      - "8083:80"
      - "8443:443"  # If https is enabled, cancel the comment.
    volumes:
      - seafile-data:/shared   # Required, specifies the path to Seafile data persistent store.
    environment:
      - DB_HOST=db
      - DB_ROOT_PASSWD=db_dev  # Required, the value should be root's password of MySQL service.
      - TIME_ZONE=Asia/Shanghai # Optional, default is UTC. Should be uncomment and set to your local time zone.
      - SEAFILE_ADMIN_EMAIL=1@1.com # Specifies Seafile admin user, default is 'me@example.com'
      - SEAFILE_ADMIN_PASSWORD=12345     # Specifies Seafile admin password, default is 'asecret'
      - SEAFILE_SERVER_LETSENCRYPT=false   # Whether to use https or not
      #- SEAFILE_SERVER_HOSTNAME=example.seafile.com # Specifies your host name if https is enabled
    depends_on:
      - db
      - memcached
      - elasticsearch
      - onlyoffice
      - onlyoffice-redis
    networks:
      - seafile-net



 
  onlyoffice:
    #image: lovechen/onlyoffice-documentserver-ee
    #image: lovechen/seafile-pro-mc:onlyoffice-ce-sp-6.3.1.32
    image: lovechen/seafile-pro-mc:onlyoffice-ce-7.0.0.132
    stdin_open: true
    restart: unless-stopped
    container_name: seafile-onlyoffice
    ports:
      - 10005:80                            #服务访问端口, 80 HTTP, 443 HTTPS
    environment:
      # --- 基础配置 ---
      # --- HTTPS 配置 (初次调试建议注释掉，调通后再开启)（如果你没有配置证书文件挂载，建议先注释掉以下三行，使用 HTTP 测试连通性） ---
      #- ONLYOFFICE_HTTPS_HSTS_ENABLED=True
      #- SSL_CERTIFICATE_PATH=/var/www/onlyoffice/Data/certs/fullchain.cer
      #- SSL_KEY_PATH=/var/www/onlyoffice/Data/certs/private.key
      #- DB_TYPE=${DB_TYPE:-mariadb}
      #- DB_HOST=${SEAFILE_MYSQL_DB_HOST:-db}
      #- DB_USER=${SEAFILE_MYSQL_DB_USER:-seafile}
      #- DB_PWD=${SEAFILE_MYSQL_DB_PASSWORD:?Variable is not set or empty}
      # ✅ 关键修正 2：启用 JWT 保护（生产环境必须开启，防止未授权访问）
      #- JWT_ENABLED=true
      #- JWT_SECRET=12345  # 🔐 必须与 Seafile seahub_settings.py中的 ONLYOFFICE_JWT_SECRET 完全一致
      #- JWT_HEADER=AuthorizationJwt         # ✅ Seafile 默认使用的 Header名称
      # Redis 配置（确保主机名与下方 redis 服务名一致）
      - REDIS_SERVER_HOST=onlyoffice-redis
      - REDIS_SERVER_PORT=6379
    volumes:
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-lib:/var/lib/onlyoffice
      - onlyoffice-postgresql:/var/lib/postgresql
      - onlyoffice-redis:/var/lib/redis
      - onlyoffice-rabbitmq:/var/lib/rabbitmq
      - onlyoffice-fonts:/usr/share/fonts/truetype/custom


    depends_on:
       onlyoffice-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'                        #限制最大CPU占用率
          memory: 2048M                        #限制最大内存
    networks:
      - seafile-net

  onlyoffice-redis:
    container_name: onlyoffice-redis
    image: redis
    restart: unless-stopped
    networks:
      - seafile-net
    expose:
      - '6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
volumes:
   onlyoffice-logs:
   onlyoffice-data:
   onlyoffice-lib:
   onlyoffice-postgresql:
   onlyoffice-rabbitmq:
   onlyoffice-redis:
   onlyoffice-fonts:

   seafile-data:
   seafile-elasticsearch:
   seafile-mysql:
networks:
  seafile-net:
